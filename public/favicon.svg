<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background with rounded corners -->
  <rect width="100" height="100" rx="24" fill="#0B0B08"/>
  <!-- Subtle green glow from bottom -->
  <radialGradient id="glow" cx="50%" cy="90%" r="70%">
    <stop offset="0%" stop-color="#00E56A" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#0B0B08" stop-opacity="0"/>
  </radialGradient>
  <rect width="100" height="100" rx="24" fill="url(#glow)"/>
  <!-- Isotipo: stem of "i" -->
  <rect x="42" y="46" width="16" height="36" rx="8" fill="#00E56A"/>
  <!-- Isotipo: floating dot above -->
  <circle cx="50" cy="30" r="10" fill="#00E56A"/>
</svg>